version: '3.8'

services:

  # =========================
  # Neo4j Graph Database
  # =========================
  neo4j:
    image: neo4j:5
    container_name: neo4j
    ports:
      - "7687:7687"   # Bolt protocol
      - "7474:7474"   # Neo4j browser
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME}/${NEO4J_PASSWORD}"
    networks:
      - ecommerce-net

  # =========================
  # PostgreSQL Database
  # =========================
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-net

  # =========================
  # Eureka Discovery Service
  # =========================
  discovery-service:
    build:
      context: ./backend/discovery-service
      dockerfile: Dockerfile
    image: discovery-service:${IMAGE_TAG}
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - ecommerce-net

  # =========================
  # API Gateway
  # =========================
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    image: api-gateway:${IMAGE_TAG}
    container_name: api-gateway
    ports:
      - "8087:8087"
    depends_on:
      - discovery-service
    networks:
      - ecommerce-net
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      JWT_SECRET: ${JWT_SECRET}

  # =========================
  # User Service
  # =========================
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    image: user-service:${IMAGE_TAG}
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery-service
      - neo4j
      - postgres
    networks:
      - ecommerce-net
    environment:
      # Neo4j
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USERNAME}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD}

      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      # Eureka
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # Mail
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}

  # =========================
  # Travel Service
  # =========================
  travel-service:
    build:
      context: ./backend/travel-service
      dockerfile: Dockerfile
    image: travel-service:${IMAGE_TAG}
    container_name: travel-service
    ports:
      - "8085:8085"
    depends_on:
      - discovery-service
      - neo4j
      - postgres
    networks:
      - ecommerce-net
    environment:
      # Neo4j
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USERNAME}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD}

      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      # Eureka
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # Mail
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
  
  # ========================
  # Frontend (Angular + Nginx)
  # ========================
  front:
    build:
      context: ./front
    image: front:${IMAGE_TAG}
    container_name: front
    ports:
      - "4200:80"  # <-- host port 4200 mapped to container port 80
    depends_on:
      - api-gateway
    networks:
      - ecommerce-net
    environment:
      VITE_API_GATEWAY_URL: http://api-gateway:8087

volumes:
  neo4j_data:
  postgres_data:

networks:
  ecommerce-net:
    driver: bridge